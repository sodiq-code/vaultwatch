# Casper testnet compatibility: disable bulk-memory WASM operations
# Casper protocol 2.2.2 rejects deploys with "Bulk memory operations are not supported"
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=-bulk-memory"]

# getrandom 0.3.x selects its OS backend via a `--cfg getrandom_backend=...`
# flag (set by its build.rs). When building for the host (cargo test --lib)
# the auto-detection can fail on this nightly toolchain, leaving the
# `backends` module empty and breaking `backends::inner_u64()`. We pin the
# Linux getrandom backend explicitly for host builds so the test suite
# compiles deterministically.
[target.x86_64-unknown-linux-gnu]
rustflags = ["--cfg", "getrandom_backend=\"linux_getrandom\""]

[build]
target = "wasm32-unknown-unknown"
