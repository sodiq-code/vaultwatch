name: VaultWatch CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  CASPER_MOCK: "true"

jobs:
  # ─── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ─── Python Tests ────────────────────────────────────────────────────────────
  test-python:
    name: Python Tests (107)
    runs-on: ubuntu-latest
    needs: lint
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'mock-key-for-ci' }}
      CASPER_MOCK: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install stable packages first, then pre-release otel instrumentation
          pip install groq fastapi "uvicorn[standard]" pydantic httpx aiohttp
          pip install opentelemetry-api opentelemetry-sdk
          pip install --pre opentelemetry-instrumentation-fastapi
          pip install fastmcp pycspr
          pip install pytest pytest-asyncio pytest-cov python-dotenv
          pip install -e sdk/

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
        env:
          PYTHONPATH: .

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
        env:
          PYTHONPATH: .

      - name: Run demo scenario tests
        run: pytest tests/demo/ -v -s --tb=short
        env:
          PYTHONPATH: .

  # ─── SDK Validation ───────────────────────────────────────────────────────────
  validate-sdk:
    name: Validate Python SDK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and validate SDK
        run: |
          pip install httpx pydantic
          pip install -e sdk/
          python -c "from vaultwatch import VaultWatchClient; print('✅ SDK import OK')"

  # ─── Rust Contracts ───────────────────────────────────────────────────────────
  test-contracts:
    name: Rust Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run contract tests
        working-directory: contracts
        run: cargo test --workspace
        continue-on-error: true

  # ─── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: vaultwatch:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
